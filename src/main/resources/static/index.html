<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="School Management System - Система управления школой">
    <title>School Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ═══════════ LOGIN PAGE ═══════════ -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="logo-icon">🎓</div>
            <h1>School Management</h1>
            <p class="subtitle">Войдите в систему для продолжения</p>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" class="form-control" id="loginUsername" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Войти</span>
                </button>
            </form>
        </div>
    </div>

    <!-- ═══════════ APP LAYOUT ═══════════ -->
    <div id="appLayout" class="app-layout" style="display:none;">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h2>🎓 School MS</h2>
                <p>Система управления</p>
            </div>
            <nav class="sidebar-nav" id="sidebarNav"></nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div>
                        <div class="user-name" id="userName">Admin</div>
                        <div class="user-role" id="userRole">ADMIN</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" style="width:100%" onclick="logout()">
                    🚪 Выйти
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent"></main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
